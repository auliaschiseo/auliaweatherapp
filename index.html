<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather App - Aulia</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="card">
		<div class="search">
			<input type="text" placeholder="Enter City Name" spellcheck="false">
			<button><img src="../asset/LucideSearch.svg"></button>
	    </div>
		<div class="error">
			<p>Invalid City Name</p>
		</div>
		<div class="weather">
			<img src="../asset/cloudy-day-2.svg" class="weather-icon">
			<h1 class="temp">22°C</h1>
			<h2 class="city">New York</h2>
			<div class="details">
				<div class="col">
					<img src="../asset/humidity_white.png">
					<div>
						<p class="humidity">50%</p>
						<p>Humidity</p>
					</div>
				</div>
				<div class="col">
					<img src="../asset/wind_white.png">
					<div>
						<p class="wind">30 km/h</p>
						<p>Wind Speed</p>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>
		const apiKey = "da696cf3cac9b6d367a6a61ed1ce17fb";
		const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

		const searchBox = document.querySelector(".search input");
		const searchButton = document.querySelector(".search button");
		const weatherIcon = document.querySelector(".weather-icon");

		async function checkWeather(city){
			const response = await fetch(apiUrl + city + `&appid=${apiKey}`);

			if(response.status == 404){
				document.querySelector(".error").style.display = "block";
				document.querySelector(".weather").style.display = "none";
			}else{
				
				var data = await response.json();

				console.log(data);

				document.querySelector(".city").innerHTML = data.name;
				document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
				document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
				document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";

				if(data.weather[0].main == "Clear"){
					weatherIcon.src = "../asset/day.svg";
				}
				else if (data.weather[0].main == "Clouds"){
					weatherIcon.src = "../asset/cloudy-day-1.svg";
				}
				else if (data.weather[0].main == "Snow"){
					weatherIcon.src = "../asset/snowy-3.svg";
				}
				else if (data.weather[0].main == "Rain"){
					weatherIcon.src = "../asset/rainy-6.svg";
				}
				else if (data.weather[0].main == "Drizzle"){
					weatherIcon.src = "../asset/rainy-4.svg";
				}
				else if (data.weather[0].main == "Mist"){
					weatherIcon.src = "../asset/cloudy.svg";
				}
				
				document.querySelector(".weather").style.display = "block";
				document.querySelector(".error").style.display = "none";
			}
		}

		searchButton.addEventListener("click", ()=>{
			checkWeather(searchBox.value);
		})

		//add to enable Enter key press
		searchBox.addEventListener("keypress", (event)=>{
			if (event.key === "Enter"){
				checkWeather(searchBox.value)
			}
		})
	</script>
</body>
</html>
